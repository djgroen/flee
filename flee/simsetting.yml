# Network (wire to network_builder)
network_type: "osm"   # osm|fully_connected|linear|ring|star
network_cache_dir: "network_cache"
network_max_radius_km: 80.0

# Radiation field
radiation_field_mode: "distance_decay"  # distance_decay|plume|none
radiation_plume_file: ""
radiation_max_dose_msv_hr: 100.0

# Decision engine (existing keys for context)
decision_mode: "blend"   # blend|switch

log_levels:
  agent: 0 
  link: 0 
  camp: 0
  conflict: 0 
  init: 0
  granularity: location 
spawn_rules:
  take_from_population: False
  insert_day0: True
move_rules:
  max_move_speed: 360.0
  max_walk_speed: 35.0
  foreign_weight: 1.0
  camp_weight: 1.0
  conflict_weight: 0.25
  conflict_movechance: 1.0
  camp_movechance: 0.001
  default_movechance: 0.3
  waypoint_movechance: 0.95   # near-certain pass-through for junctions/checkpoints
  awareness_level: 1
  capacity_scaling: 1.0
  avoid_short_stints: False
  start_on_foot: False
  weight_power: 1.0
  # V3 Dual-Process Decision Making
  two_system_decision_making: true
  s1s2_model:
    alpha: 2.0    # Experience-to-capacity rate
    beta: 2.0     # Conflict-to-opportunity collapse steepness
    kappa: 5.0    # S2 move-decision sensitivity
optimisations:
  hasten: 1
