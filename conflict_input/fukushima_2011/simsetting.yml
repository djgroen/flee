# PHYSICAL PARAMETERS — fixed from empirical data, not calibrated.
# All values are per 2-hour timestep.
#
# conflict_movechance = 0.25:
#   Derived from Hayano & Adachi (2013) Fig 3.
#   Inner zone (<5km) cleared from ~12,500 to ~625 (95%) in ~9 steps (18h).
#   p_step = 1 - (1-0.95)^(1/9) = 0.254. Rounded to 0.25.
#   Represents S1 heuristic flight rate under acute threat.
#
# default_movechance = 0.005:
#   Shelter-in-place compliance in town zones before evacuation orders.
#   ~5.7% daily departure rate (mostly S2-driven, not S1).
#   Retained from previous calibration — empirically consistent with
#   observed slow voluntary departure before orders were issued.
#
# max_move_speed = 20:
#   Lower bound of Toyota G-BOOK probe-car range (7-20 km/h).
#   At 2h timestep: 7 km/h × 2h = 14 km/step minimum.
#   Using 20 km/step (10 km/h) — severe congestion, consistent with
#   documented gridlock on Route 6 during Fukushima evacuation.
#   Shimazaki et al. (2012).

move_rules:
  conflict_movechance: 0.25
  default_movechance: 0.005
  camp_movechance: 0.001
  awareness_level: 1
  max_move_speed: 20.0
  max_walk_speed: 7.0
  two_system_decision_making: true
  s1s2_model:
    alpha: 2.0
    beta: 4.0
    kappa: 1.0

spawn_rules:
  take_from_population: True
  insert_day0: True

log_levels:
  agent: 0
  link: 0
  camp: 0
  conflict: 0
  init: 0
