# CALIBRATION NOTE — all movechance values are per 2-hour timestep, not per day.
# Conversion: p_step = 1 - (1 - f_daily)^(2/24)
# At daily timesteps the standard flee defaults (conflict=0.5, default=0.3)
# are appropriate. At 2h timesteps those values cause unrealistically fast
# evacuation. See scripts/build_fukushima_network.py for derivation.
#
# awareness_level=1 prevents S2 agents in outer zones seeing inner zone
# conflict and self-evacuating before official orders. At awareness_level=2,
# Tomioka agents see Futaba/Namie conflict and 58% self-evacuate before
# the 10km order fires — inconsistent with observed shelter-in-place behavior.

move_rules:
  conflict_movechance: 0.14   # ~84% daily departure rate under conflict
  default_movechance: 0.005   # ~5% daily (0.004 triggers flee auto-camp; 0.005 is threshold)
  camp_movechance: 0.001
  awareness_level: 1          # 1-link lookahead prevents pre-order S2 departure
  max_move_speed: 20.0        # starting point for grid search (10 km/h avg)
  max_walk_speed: 7.0
  two_system_decision_making: true
  s1s2_model:
    alpha: 2.0
    beta: 4.0
    kappa: 1.0   # reduced from 5.0 to suppress pre-order S2 departure

spawn_rules:
  take_from_population: True
  insert_day0: True

log_levels:
  agent: 0
  link: 0
  camp: 0
  conflict: 0
  init: 0
